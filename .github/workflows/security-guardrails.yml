name: Security Guardrails

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-guardrails-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CI: "true"
  NPM_CONFIG_IGNORE_SCRIPTS: "true"

jobs:
  dependency-review:
    name: Dependency Review
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4.8.3
        with:
          fail-on-severity: moderate

  security-scans:
    name: Security Scans
    runs-on: ubuntu-latest
    outputs:
      has_lockfile: ${{ steps.lockfile-check.outputs.has_lockfile }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Detect Node lockfile
        id: lockfile-check
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            echo "has_lockfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lockfile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: ${{ steps.lockfile-check.outputs.has_lockfile == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies safely
        if: ${{ steps.lockfile-check.outputs.has_lockfile == 'true' }}
        run: npm ci --ignore-scripts

      - name: Verify npm signatures and provenance
        if: ${{ steps.lockfile-check.outputs.has_lockfile == 'true' }}
        run: npm audit signatures

      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"

      - name: Generate CycloneDX SBOM
        if: ${{ steps.lockfile-check.outputs.has_lockfile == 'true' }}
        run: npx --yes @cyclonedx/cyclonedx-npm@4.1.1 --output-file sbom.json --output-format JSON

      - name: Upload SBOM artifact
        if: ${{ steps.lockfile-check.outputs.has_lockfile == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json

  osv-pr-scan:
    name: OSV PR Scan
    if: ${{ github.event_name == 'pull_request' }}
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.5
    with:
      matrix-property: repo-
      scan-args: |-
        --recursive
        ./
    permissions:
      actions: read
      contents: read
      security-events: write

  osv-full-scan:
    name: OSV Full Scan
    if: ${{ github.event_name != 'pull_request' }}
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      matrix-property: repo-
      scan-args: |-
        --recursive
        ./
    permissions:
      actions: read
      contents: read
      security-events: write

  osv-sbom-scan:
    name: OSV SBOM Scan
    needs:
      - security-scans
    if: ${{ needs.security-scans.outputs.has_lockfile == 'true' }}
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      matrix-property: sbom-
      download-artifact: sbom
      results-file-name: osv-sbom.sarif
      scan-args: |-
        --sbom=sbom.json
    permissions:
      actions: read
      contents: read
      security-events: write

  iac-scan:
    name: IaC Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Check whether Terraform files exist
        id: tf-check
        run: |
          if find . -type f -name "*.tf" | grep -q .; then
            echo "has_tf=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tf=false" >> "$GITHUB_OUTPUT"
          fi

      - name: No Terraform files found
        if: ${{ steps.tf-check.outputs.has_tf != 'true' }}
        run: echo "No Terraform files found. Skipping Checkov."

      - name: Set up Python
        if: ${{ steps.tf-check.outputs.has_tf == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run Checkov
        if: ${{ steps.tf-check.outputs.has_tf == 'true' }}
        id: checkov
        continue-on-error: true
        run: |
          python -m pip install --disable-pip-version-check --no-input checkov==3.2.513
          mkdir -p reports
          checkov -d . -o sarif > reports/checkov.sarif

      - name: Upload Checkov SARIF
        if: ${{ always() && steps.tf-check.outputs.has_tf == 'true' && hashFiles('reports/checkov.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/checkov.sarif

      - name: Fail if Checkov found issues
        if: ${{ steps.tf-check.outputs.has_tf == 'true' && steps.checkov.outcome != 'success' }}
        run: exit 1